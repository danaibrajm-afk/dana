<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Math Kids Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Fredoka', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2,#ff758c);
    background-size:400% 400%;
    animation:bgMove 8s infinite alternate;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bgMove {
    0% { background-position:0% }
    100% { background-position:100% }
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    width:420px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.title {
    font-family:'Baloo 2',cursive;
    font-size:38px;
}

/* QUESTION */
.question {
    font-size:42px;
    margin:20px 0;
}

/* OPTIONS */
.options {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.option {
    background:white;
    color:#333;
    padding:18px;
    border-radius:18px;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover {
    transform:scale(1.1) rotate(2deg);
}

/* RESULT CENTER */
#result {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:50px;
    padding:25px 50px;
    border-radius:30px;
    color:white;
    z-index:100;
}

.show {
    animation:pop 0.6s ease;
    transform:translate(-50%,-50%) scale(1);
}

.correct {
    background:#00e676;
    box-shadow:0 0 40px #00ff88;
}

.wrong {
    background:#ff1744;
    box-shadow:0 0 40px red;
}

@keyframes pop {
    0% { transform:translate(-50%,-50%) scale(0.3); }
    60% { transform:translate(-50%,-50%) scale(1.3); }
    100% { transform:translate(-50%,-50%) scale(1); }
}

/* SCORE */
#score {
    margin-top:15px;
    font-size:22px;
}

</style>
</head>

<body>

<div class="card">
    <div class="title">🧮 Сандар әлемі</div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div id="score">Ұпай: 0 / 10</div>
</div>

<div id="result"></div>

<script>

let score = 0;
let count = 0;
const total = 10;

function newQuestion(){

    if(count >= total){
        document.querySelector(".card").innerHTML =
        `<h2>🏆 Аяқталды!</h2>
         <p>Ұпай: ${score} / 10</p>`;
        return;
    }

    count++;

    let a = Math.floor(Math.random()*10)+1;
    let b = Math.floor(Math.random()*10)+1;

    let ops = ["+","-","×"];
    let op = ops[Math.floor(Math.random()*ops.length)];

    let correct;

    if(op === "+") correct = a + b;
    if(op === "-") correct = a - b;
    if(op === "×") correct = a * b;

    document.getElementById("question").innerText = `${a} ${op} ${b} = ?`;

    let answers = [correct];

    while(answers.length < 4){
        let wrong = correct + Math.floor(Math.random()*10 - 5);
        if(!answers.includes(wrong)){
            answers.push(wrong);
        }
    }

    answers.sort(()=>Math.random()-0.5);

    const container = document.getElementById("options");
    container.innerHTML = "";

    answers.forEach(ans=>{
        let div = document.createElement("div");
        div.className="option";
        div.innerText = ans;

        div.onclick = ()=>{
            if(ans === correct){
                score++;
                show("ДҰРЫС 🎉",true);
            } else {
                show("ҚАТЕ ❌",false);
            }

            document.getElementById("score").innerText =
            `Ұпай: ${score} / 10`;

            setTimeout(newQuestion,900);
        };

        container.appendChild(div);
    });
}

function show(text,ok){
    let r=document.getElementById("result");
    r.innerText=text;
    r.className="show "+(ok?"correct":"wrong");

    setTimeout(()=>r.className="",800);
}

newQuestion();

</script>

</body>
</html>
